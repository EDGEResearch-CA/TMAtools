name: R-CMD-check

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      CI: true
      R_LIBS_USER: ${{ github.workspace }}/.R/library
      R_TESTS: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Pre-flight deterministic environment
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${{ github.workspace }}/.R/library"
          mkdir -p "${{ runner.temp }}/tmatools-ci"
          echo "TMPDIR=${{ runner.temp }}/tmatools-ci" >> "${GITHUB_ENV}"
          rm -rf "${{ github.workspace }}/.Rcheck" "${{ github.workspace }}/tmatools_output"

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::testthat
          needs: check

      - name: R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--no-manual", "--as-cran")'

      - name: Run testthat
        run: Rscript -e 'testthat::test_local()'
