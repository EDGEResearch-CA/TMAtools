url: https://edgeresearch-ca.github.io/tmatools
home:
  title: "TMAtools"
  logo: ~
template:
  bootstrap: 5
  bslib:
    bootswatch: pulse
    pkgdown-nav-height: 100px
navbar:
  structure:
    left:  [reference, edgelab, poster]
    right: [search, github, lightswitch]
  components:
    edgelab:
      text: "EDGE Research Lab"
      href: https://www.edgeresearch.ca
      target: _blank
      icon: fa-microscope
    poster:
      text: "Poster"
      href: https://raw.githubusercontent.com/EDGEResearch-CA/TMAtools/master/pkgdown/assets/tmatools_poster.pdf
      target: _blank
reference:
- title: "Main function"
  desc: >
    Main function which runs the entire TMAtools pipeline.
  contents: 
  - tmatools
- title: "Individual steps"
  desc: >
    Each major step in the TMAtools pipeline.
  contents:
  - combine_tma_spreadsheets
  - deconvolute
  - translate_scores
  - consolidate_scores
- title: "Post-consolidation analysis"
  desc: >
    Functions for downstream analysis of consolidated TMA data.
  contents:
  - assess_mmr_status
